name: Nightly Build

on:
  schedule:
    # Run at 02:00 UTC (10:00 北京时间)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits in last 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Manual trigger, will always build."
            exit 0
          fi
          COMMITS=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Found $COMMITS commit(s) in last 24h, proceeding with build."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No commits in last 24h, skipping build."
          fi

  build:
    name: Build
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mtt-debug-${{ github.run_date }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: mtt-lint-report-${{ github.run_date }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: mtt-test-report-${{ github.run_date }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="nightly-$(date +'%Y%m%d')"
          # Create release silently if it doesn't exist yet
          gh release create "$TAG_NAME" --title "Nightly Build $(date +'%Y-%m-%d')" --notes "Auto-built from commit ${{ github.sha }}" 2>/dev/null || echo "Release $TAG_NAME already exists, will upload to it."
          # Upload with --clobber to replace existing assets for same-date re-runs
          gh release upload "$TAG_NAME" app/build/outputs/apk/debug/*.apk --clobber

      - name: Generate build metrics
        run: |
          echo "### Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          TEST_COUNT=$(find app/build/reports/tests/testDebugUnitTest -name "*.html" -exec grep -oP '\d+(?= tests)' {} + 2>/dev/null | head -1 || echo "N/A")
          echo "| Test Count | $TEST_COUNT |" >> $GITHUB_STEP_SUMMARY
